  <style>
    body {
      margin: 0;
      font-family: system-ui, -apple-system, Segoe UI, Roboto, Arial, sans-serif;

    }
    header {
      padding: 16px 18px 10px 18px;
      background: white;

    }
    h1 {
      margin: 0 0 10px 0;
      font-size: 18px;
      font-weight: 700;
    }
    .controls {
      display: flex;
      gap: 10px;
      flex-wrap: wrap;
      align-items: center;
    }
    select, button {
      padding: 10px 12px;
      border: 1px solid #ddd;
      border-radius: 10px;
      background: white;
      font-size: 14px;
      cursor: pointer;
    }
    button:active { transform: scale(0.98); }
    .pill {
      padding: 6px 10px;
      border-radius: 999px;
      border: 1px solid #e5e5e5;
      background: #f3f3f3;
      font-size: 13px;
      color: #333;
    }
    #map {
      height: calc(100vh - 94px);
      width: 100%;
    }
    .legend {
      background: rgba(255,255,255,0.92);
      border: 1px solid #ddd;
      border-radius: 10px;
      padding: 10px 12px;
      line-height: 1.2;
    }
    .legend .bar {
      width: 180px;
      height: 10px;
      border-radius: 999px;
      background: linear-gradient(to right, #d7191c, #fdae61, #ffffbf, #a6d96a, #1a9641);
      border: 1px solid #ddd;
      margin: 6px 0 6px 0;
    }
    .legend .row {
      display:flex;
      justify-content:space-between;
      font-size:12px;
      color:#333;
    }

    /* larger hover text only */
    .point-tooltip.leaflet-tooltip {
      font-size: 18px;
      line-height: 1.2;
    }
  </style>

    const YEARS = ["2021", "2022", "2023", "2024", "2025", "2026"];
    const MONTHS = ["January", "February", "March", "April", "May", "June", "July", "August", "September", "October", "November", "December"];
    const VMIN = 20.0;
    const VMAX = 100.0;
    const IRE_BOUNDS = {"southWest": [51.3, -11.0], "northEast": [55.5, -5.0]};

    const map = L.map('map', {
      maxBounds: L.latLngBounds(IRE_BOUNDS.southWest, IRE_BOUNDS.northEast),
      maxBoundsViscosity: 1.0
    });

    L.tileLayer('https://{s}.basemaps.cartocdn.com/light_all/{z}/{x}/{y}{r}.png', {
      attribution: '&copy; OpenStreetMap contributors &copy; CARTO',
      subdomains: 'abcd',
      maxZoom: 18
    }).addTo(map);

    map.fitBounds([IRE_BOUNDS.southWest, IRE_BOUNDS.northEast]);

    function clamp01(x) { return Math.max(0, Math.min(1, x)); }
    function interp(a, b, t) { return a + (b - a) * t; }

    function colorFor(value) {
      const t = clamp01((value - VMIN) / (VMAX - VMIN || 1));
      let r, g, b;
      if (t < 0.5) {
        const tt = t / 0.5;
        r = interp(215, 255, tt);
        g = interp( 25, 255, tt);
        b = interp( 28, 191, tt);
      } else {
        const tt = (t - 0.5) / 0.5;
        r = interp(255,  26, tt);
        g = interp(255, 150, tt);
        b = interp(191,  65, tt);
      }
      return `rgb(${Math.round(r)}, ${Math.round(g)}, ${Math.round(b)})`;
    }

    let markerLayer = L.layerGroup().addTo(map);

    const yearSelect = document.getElementById('yearSelect');
    const monthSelect = document.getElementById('monthSelect');
    const status = document.getElementById('status');

    YEARS.forEach(y => {
      const opt = document.createElement('option');
      opt.value = y; opt.textContent = y;
      yearSelect.appendChild(opt);
    });
    MONTHS.forEach(m => {
      const opt = document.createElement('option');
      opt.value = m; opt.textContent = m;
      monthSelect.appendChild(opt);
    });

    function render() {
      markerLayer.clearLayers();

      const y = yearSelect.value;
      const m = monthSelect.value;

      const pts = (DATA[y] && DATA[y][m]) ? DATA[y][m] : [];
      pts.forEach(p => {
        const marker = L.circleMarker([p.lat, p.lon], {
          radius: 7,
          color: '#000',
          weight: 1,
          fillColor: colorFor(p.rate),
          fillOpacity: 0.9
        });

        marker.bindTooltip(
          `${p.centre}<br><b>${p.month} ${p.year}</b><br>Pass rate: <b>${p.rate.toFixed(1)}%</b>`,
          {
            sticky: true,
            direction: 'top',
            opacity: 0.95,
            className: 'point-tooltip'
          }
        );

        marker.addTo(markerLayer);
      });

      status.textContent = `${m} ${y} — ${pts.length} centres`;
      history.replaceState(null, "", `#${encodeURIComponent(y)}-${encodeURIComponent(m)}`);
    }

    const prevBtn = document.getElementById('prevBtn');
    const nextBtn = document.getElementById('nextBtn');

    function getMonthIdx() { return MONTHS.indexOf(monthSelect.value); }
    function getYearIdx() { return YEARS.indexOf(yearSelect.value); }

    function go(delta) {
      let mi = getMonthIdx() + delta;
      let yi = getYearIdx();

      if (mi < 0) {
        mi = MONTHS.length - 1;
        yi = (yi - 1 + YEARS.length) % YEARS.length;
      } else if (mi >= MONTHS.length) {
        mi = 0;
        yi = (yi + 1) % YEARS.length;
      }

      yearSelect.value = YEARS[yi];
      monthSelect.value = MONTHS[mi];
      render();
    }

    prevBtn.addEventListener('click', () => go(-1));
    nextBtn.addEventListener('click', () => go( 1));
    yearSelect.addEventListener('change', render);
    monthSelect.addEventListener('change', render);

    window.addEventListener('keydown', (e) => {
      if (e.key === "ArrowLeft") prevBtn.click();
      if (e.key === "ArrowRight") nextBtn.click();
    });

    // Default selection:
    // - Month: current visitor month
    // - Year: 2021 (if available)
    const now = new Date();
    const currentMonth = MONTHS[now.getMonth()];
    const defaultYear = YEARS.includes("2021") ? "2021" : YEARS[0];

    // Allow URL hash override: #2021-October
    const hash = decodeURIComponent(location.hash.replace("#",""));
    if (hash.includes("-")) {
      const [hy, hm] = hash.split("-");
      yearSelect.value = YEARS.includes(hy) ? hy : defaultYear;
      monthSelect.value = MONTHS.includes(hm) ? hm : currentMonth;
    } else {
      yearSelect.value = defaultYear;
      monthSelect.value = currentMonth;
    }

    // Legend
    const legend = L.control({position: 'bottomleft'});
    legend.onAdd = function () {
      const div = L.DomUtil.create('div', 'legend');
      div.innerHTML = `
        <div style="font-weight:700; font-size:13px;">Pass rate (%)</div>
        <div class="bar"></div>
        <div class="row"><span>${VMIN.toFixed(1)}</span><span>${VMAX.toFixed(1)}</span></div>
        <div style="margin-top:6px; font-size:12px; color:#444;">Hover a point for centre details</div>
      `;
      return div;
    };
    legend.addTo(map);

    render();
  </script>
