    const monthOrder = ["January", "February", "March", "April", "May", "June", "July", "August", "September", "October", "November", "December"];
    const VMIN = 33.075;
    const VMAX = 74.24;
    const IRE_BOUNDS = {"southWest": [51.3, -11.0], "northEast": [55.5, -5.0]};

    // --- Map setup ---
    const map = L.map('map', {
      maxBounds: L.latLngBounds(IRE_BOUNDS.southWest, IRE_BOUNDS.northEast),
      maxBoundsViscosity: 1.0
    });

    // CartoDB Positron tiles
    L.tileLayer('https://{s}.basemaps.cartocdn.com/light_all/{z}/{x}/{y}{r}.png', {
      attribution: '&copy; OpenStreetMap contributors &copy; CARTO',
      subdomains: 'abcd',
      maxZoom: 18
    }).addTo(map);

    map.fitBounds([IRE_BOUNDS.southWest, IRE_BOUNDS.northEast]);

    // --- Color scale: red -> yellow -> green ---
    function clamp01(x) { return Math.max(0, Math.min(1, x)); }
    function interp(a, b, t) { return a + (b - a) * t; }

    // Simple 3-stop gradient (red -> yellow -> green)
    function colorFor(value) {
      const t = clamp01((value - VMIN) / (VMAX - VMIN || 1));
      let r, g, b;
      if (t < 0.5) {
        // red(215,25,28) -> yellow-ish(255,255,191)
        const tt = t / 0.5;
        r = interp(215, 255, tt);
        g = interp( 25, 255, tt);
        b = interp( 28, 191, tt);
      } else {
        // yellow-ish(255,255,191) -> green(26,150,65)
        const tt = (t - 0.5) / 0.5;
        r = interp(255,  26, tt);
        g = interp(255, 150, tt);
        b = interp(191,  65, tt);
      }
      return `rgb(${Math.round(r)}, ${Math.round(g)}, ${Math.round(b)})`;
    }

    // Marker layer that we replace on month change
    let markerLayer = L.layerGroup().addTo(map);

    function renderMonth(monthName) {
      markerLayer.clearLayers();

      const pts = dataByMonth[monthName] || [];
      pts.forEach(p => {
        const marker = L.circleMarker([p.lat, p.lon], {
          radius: 7,
          color: '#000',
          weight: 1,
          fillColor: colorFor(p.rate),
          fillOpacity: 0.9
        });

        marker.bindTooltip(`${p.centre} — ${p.rate.toFixed(1)}%`, {
          sticky: true,
          direction: 'top',
          opacity: 0.95
        });

        marker.addTo(markerLayer);
      });

      document.getElementById('status').textContent = monthName;
    }

    // --- UI controls ---
    const select = document.getElementById('monthSelect');
    const prevBtn = document.getElementById('prevBtn');
    const nextBtn = document.getElementById('nextBtn');

    monthOrder.forEach(m => {
      const opt = document.createElement('option');
      opt.value = m;
      opt.textContent = m;
      select.appendChild(opt);
    });

    function idxOfCurrent() {
      return monthOrder.indexOf(select.value);
    }
    function go(i) {
      const n = monthOrder.length;
      const ii = (i % n + n) % n;
      select.value = monthOrder[ii];
      renderMonth(select.value);
      history.replaceState(null, "", `#${encodeURIComponent(select.value)}`);
    }

    select.addEventListener('change', () => {
      renderMonth(select.value);
      history.replaceState(null, "", `#${encodeURIComponent(select.value)}`);
    });
    prevBtn.addEventListener('click', () => go(idxOfCurrent() - 1));
    nextBtn.addEventListener('click', () => go(idxOfCurrent() + 1));

    // Keyboard arrows
    window.addEventListener('keydown', (e) => {
      if (e.key === "ArrowLeft") prevBtn.click();
      if (e.key === "ArrowRight") nextBtn.click();
    });

    // --- Legend ---
    const legend = L.control({position: 'bottomleft'});
    legend.onAdd = function () {
      const div = L.DomUtil.create('div', 'legend');

        <div style="font-weight:700; font-size:13px;">Avg pass rate (%)</div>
        <div class="bar"></div>
        <div class="row"><span>${VMIN.toFixed(1)}</span><span>${VMAX.toFixed(1)}</span></div>
        <div style="margin-top:6px; font-size:12px; color:#444;">Hover a point to see centre name</div>
      `;
      return div;
    };
    legend.addTo(map);

    // Default month = current month, but allow URL hash override (#October)
    const hashMonth = decodeURIComponent(location.hash.replace("#",""));
    const jsMonth = monthOrder[new Date().getMonth()];
    const startMonth = (hashMonth && dataByMonth[hashMonth]) ? hashMonth : jsMonth;

    select.value = startMonth;
    renderMonth(startMonth);
  </script>
