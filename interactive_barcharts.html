<html lang="en">
<head>
  <meta charset="utf-8"/>

  <style>
    body{
      margin:0;
      font-family: system-ui, -apple-system, Segoe UI, Roboto, Arial, sans-serif;
      background:#f5f5f5;
    }
    header{
      padding:16px 18px 10px 18px;
      background:white;
      border-bottom:1px solid #e6e6e6;
    }
    h1{
      margin:0 0 10px 0;
      font-size:18px;
      font-weight:700;
    }
    .controls{
      display:flex;
      gap:10px;
      flex-wrap:wrap;
      align-items:center;
    }
    select, button{
      padding:10px 12px;
      border:1px solid #ddd;
      border-radius:10px;
      background:white;
      font-size:14px;
      cursor:pointer;
    }
    button:active{ transform: scale(0.98); }
    .pill{
      padding:6px 10px;
      border-radius:999px;
      border:1px solid #e5e5e5;
      background:#f3f3f3;
      font-size:13px;
      color:#333;
    }

    main{
      padding:14px 18px 22px 18px;
      max-width: 1800;
      margin: 0;
    }
    .card{
      background:white;
      border:1px solid #e6e6e6;
      border-radius:14px;
      padding:14px;
      box-shadow: 0 6px 18px rgba(0,0,0,0.06);
    }
    .imgwrap{
      width:100%;
      overflow:hidden;
      border-radius:12px;
      border:1px solid #eee;
      background:#fafafa;
    }
    img{
      display:block;
      width:100%;
      height:auto;
    }
    .note{
      margin-top:10px;
      font-size:13px;
      color:#555;
    }
    .error{
      margin-top:10px;
      font-size:13px;
      color:#b00020;
      display:none;
    }
  </style>
</head>
<body>
  <header>
    <h1>Average Pass Rate by Month — Bar Charts (By Test Centre)</h1>
    <div class="controls">
      <button id="prevBtn" aria-label="Previous centre">← Prev</button>
      <select id="centreSelect" aria-label="Select test centre"></select>
      <button id="nextBtn" aria-label="Next centre">Next →</button>
      <span class="pill" id="status">Loading…</span>
    </div>
  </header>

  <main>
    <div class="card">
      <div class="imgwrap">
        <img id="chartImg" alt="Bar chart of average pass rate by month" />
      </div>
      <div class="error" id="errMsg">Image failed to load. Check the URL / filename.</div>
      <div class="note">
      </div>
    </div>
  </main>

    // Convert GitHub "blob" links to RAW links:
    // https://github.com/<user>/<repo>/blob/<sha>/file.png
    // -> https://raw.githubusercontent.com/<user>/<repo>/<sha>/file.png
    function blobToRaw(url){
      try{
        const u = new URL(url);
        if (u.hostname !== "github.com") return url;
        const parts = u.pathname.split("/").filter(Boolean); // [user, repo, "blob", sha, ...path]
        if (parts.length >= 5 && parts[2] === "blob") {
          const user = parts[0];
          const repo = parts[1];
          const sha = parts[3];
          const filePath = parts.slice(4).join("/");
          return `https://raw.githubusercontent.com/${user}/${repo}/${sha}/${filePath}`;
        }
      }catch(e){}
      return url;
    }

      "Mitchelstown, Co. Cork": blobToRaw("https://github.com/acs5/infovisassignment/blob/8762b5c47efcbe9b64238a00e8bdb148d74d6728/avg_passrate_Mitchelstown_%20Co_%20Cork.png"),

      "Mulhuddart, Co. Dublin": blobToRaw("https://github.com/acs5/infovisassignment/blob/8762b5c47efcbe9b64238a00e8bdb148d74d6728/avg_passrate_Mulhuddart_%20Co_%20Dublin.png"),
      "Mullingar, Co. Westmeath": blobToRaw("https://github.com/acs5/infovisassignment/blob/d7a397e63c728cb67dc1ecb8a79d60d4509cbb0b/avg_passrate_Mullingar_%20Co_%20Westmeath.png"),

      "Tullamore, Co. Offaly": blobToRaw("https://github.com/acs5/infovisassignment/blob/8762b5c47efcbe9b64238a00e8bdb148d74d6728/avg_passrate_Tullamore_%20Co_%20Offaly.png"),

    };

    // Sorted list for dropdown + navigation
    const centres = Object.keys(centreToUrl).sort((a,b) => a.localeCompare(b));
    const select = document.getElementById("centreSelect");
    const img = document.getElementById("chartImg");
    const status = document.getElementById("status");
    const errMsg = document.getElementById("errMsg");

    centres.forEach(name => {
      const opt = document.createElement("option");
      opt.value = name;
      opt.textContent = name;
      select.appendChild(opt);
    });

    function renderCentre(name){
      const url = centreToUrl[name] || "";
      status.textContent = name;

      errMsg.style.display = "none";
      img.style.display = "block";

      // If missing URL, show a friendly error
      if (!url){
        img.removeAttribute("src");
        errMsg.textContent = "No image URL set for this centre yet (add the raw GitHub URL).";
        errMsg.style.display = "block";
        img.style.display = "none";
        return;
      }

      img.src = url;
      img.alt = `Average pass rate by month — ${name}`;

      history.replaceState(null, "", `#${encodeURIComponent(name)}`);
    }

    function idx(){ return centres.indexOf(select.value); }
    function go(delta){
      const n = centres.length;
      let i = idx();
      i = (i + delta + n) % n;
      select.value = centres[i];
      renderCentre(select.value);
    }

    document.getElementById("prevBtn").addEventListener("click", () => go(-1));
    document.getElementById("nextBtn").addEventListener("click", () => go(1));

    select.addEventListener("change", () => renderCentre(select.value));

    // Keyboard navigation
    window.addEventListener("keydown", (e) => {
      if (e.key === "ArrowLeft") go(-1);
      if (e.key === "ArrowRight") go(1);
    });

    // Default: URL hash if present, else first centre
    const hash = decodeURIComponent(location.hash.replace("#",""));
    const initial = (hash && centreToUrl.hasOwnProperty(hash)) ? hash : centres[0];
    select.value = initial;
    renderCentre(initial);
  </script>
</body>
</html>
